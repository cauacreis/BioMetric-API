# ============================================================
#  BioMetrics API — Configurações da Aplicação
# ============================================================

# Porta do servidor
server.port=8080

# Nome da aplicação
spring.application.name=biometrics-api

# ============================================================
#  Groq LLM — Treinador Virtual
#  IMPORTANTE: Nunca commitar a chave real aqui!
#  Use variável de ambiente: GROQ_API_KEY=gsk_...
#  Ou crie um arquivo local: application-local.properties
# ============================================================

# Chave da API Groq (override via env var GROQ_API_KEY)
groq.api.key=${GROQ_API_KEY:SUA_CHAVE_AQUI}

# Modelo Groq a utilizar
groq.model=llama-3.1-8b-instant

# ============================================================
#  Springdoc OpenAPI — Swagger UI
# ============================================================

# Swagger UI acessível em /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html

# Endpoint JSON da spec OpenAPI
springdoc.api-docs.path=/api-docs

# Organiza operações por método HTTP
springdoc.swagger-ui.operations-sorter=method

# Habilita o "Try it out" automático
springdoc.swagger-ui.try-it-out-enabled=true

# ============================================================
#  Logs
# ============================================================
logging.level.com.biometrics=DEBUG
logging.level.org.springframework.web=INFO